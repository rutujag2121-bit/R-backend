# SonarQube / SonarCloud configuration for Backend
sonar.projectKey=rutujag2121-bit_secure-devops-backend
sonar.organization=rutujag2121-bit

sonar.projectName=Secure DevOps - Backend
sonar.projectVersion=1.0

# Source and test paths
sonar.sources=app
sonar.tests=tests
sonar.language=py

# Coverage report (generated by pytest-cov)
sonar.python.coverage.reportPaths=coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/__pycache__/**,**/*.pyc,**/migrations/**
